# Extent report HTML
extent.reporter.cucumber-adapter.start=true
#extent.reporter.cucumber-adapter.out=Reports/ExtentReport.html


## Enable Spark (HTML) report
extent.reporter.spark.start=true
extent.reporter.spark.out=Reports/SparkReport.html
extent.reporter.spark.theme=standard
extent.reporter.spark.timeline=true
extent.reporter.spark.screenCaptureLocation=Reports/screenshots/


# Optional: Enable other reporters (HTML, JSON, etc.)
extent.reporter.html.start=true
extent.reporter.html.out=Reports/index.html
extent.reporter.html.display.after.hooks=false
extent.reporter.html.config=src/test/resources/extent-config.xml

# Screenshots (required for manual approach)
screenshot.dir=Reports/screenshots
screenshot.rel.path=./screenshots/
screenshot.override=true
